<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Login - Authentic Indian Restaurant</title>
    <style>
        .header-bar {
            background-color: #ff6600;
            color: white;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .logo-container {
            background-color: black;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            position: absolute;
            left: 20px;
            top: 0;
            height: 100%;
            z-index: 10;
        }
        .logo-container img {
            height: 80px;
        }
        .restaurant-name {
            background-color: #ff6600;
            padding: 15px 30px;
            flex-grow: 1;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            font-family: "Times New Roman", Times, serif;
            margin-left: 120px;
        }
        body {
            background-color: black;
            color: white;
        }
        .navbar-nav .nav-link {
            color: white !important;
        }
        .navbar-nav .nav-link:hover {
            color: #ff6600 !important;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: #1a1a1a;
            border-radius: 10px;
            border: 2px solid #ff6600;
        }
        .form-control {
            background-color: #333;
            border: 1px solid #ff6600;
            color: white;
        }
        .form-control:focus {
            background-color: #333;
            border-color: #ff6600;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(255, 102, 0, 0.25);
        }
        .btn-login {
            background-color: #ff6600;
            border: none;
            color: white;
            padding: 10px 20px;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #e55800;
            color: white;
        }
        .form-label {
            color: #ff6600;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Combined Header Bar - Logo and Restaurant Name -->
    <div class="header-bar">
        <div class="logo-container">
            <img src="logo2.png" alt="Restaurant Logo">
        </div>
        <div class="restaurant-name">
            AUTHENTIC INDIAN RESTAURANT
        </div>
    </div>

    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registrationform.html">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4" style="color: #ff6600;">Login to Your Account</h2>
            <form>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-login">Login</button>
                </div>
                <div class="text-center mt-3">
                    <p>Don't have an account? <a href="registrationform.html" style="color: #ff6600;">Register here</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <footer class="text-center text-white p-3 mt-5" style="background-color:#111;">
    <p>© 2026 Authentic Indian Restaurant | Developed by Srihari</p>
</footer>
</body>
</html>
